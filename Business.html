<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bashar Telecom - Business</title>
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; padding: 20px; color: #333; }
        .container { background-color: white; max-width: 500px; margin: 20px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #198754; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #198754; color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #157347; }
        .result { background-color: #e8f5e9; border: 1px solid #c8e6c9; padding: 15px; border-radius: 6px; margin-top: 20px; display: none; font-weight: bold; color: #1b5e20; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Bashar Telecom</h2>
        
        <!-- CALCULATOR SECTION -->
        <div style="margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px dashed #ccc;">
            <h4 style="text-align:center;">Lissafo Kudin Aiki Cikin Sauri</h4>
            <div class="form-group">
                <label>Zabi Sabis:</label>
                <select id="sabis">
                    <option value="100">Siyar da SIM Card (₦100)</option>
                    <option value="50">Saka Katin Waya (₦50)</option>
                    <option value="500">Gyaran Waya (₦500)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Yawan Aiki:</label>
                <input type="number" id="yawan_aiki" value="1">
            </div>
            <button onclick="lissakoKudi()">Lissafo Kudi</button>
            <div id="sakamako" class="result"></div>
        </div>

        <!-- FIREBASE FORM SECTION -->
        <h4>Tura Bukatar Aiki</h4>
        <div class="form-group">
            <label>Sunanka:</label>
            <input type="text" id="bako_suna" placeholder="Rubuta sunanka">
        </div>
        <div class="form-group">
            <label>Lambar Wayarka:</label>
            <input type="tel" id="bako_tel" placeholder="070...">
        </div>
        <div class="form-group">
            <label>Imeil Dinka (Idan akwai):</label>
            <input type="email" id="bako_email" placeholder="Sanya email">
        </div>
        <button onclick="turaBayanai()">Tura Bayanai zuwa Database</button>
    </div>

    <!-- HADA FIREBASE LIBRARIES -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyAgoZjSj0UhNuS41829TufSsQjxxtmNzHA",
            authDomain: "://firebaseapp.com",
            projectId: "bashar-telecome",
            storageBucket: "bashar-telecome.firebasestorage.app",
            messagingSenderId: "132367519500",
            appId: "1:132367519500:web:046269e58a79bb9badc329"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Alert na Maraba
        alert("Barka da zuwa Bashar Telecom! \nMuna farin ciki da ziyararku.");

        // Aikin Calculator
        window.lissakoKudi = function() {
            let kudin_sabis = document.getElementById("sabis").value;
            let yawa = document.getElementById("yawan_aiki").value;
            let jimilla = kudin_sabis * yawa;
            let gurin_sakamako = document.getElementById("sakamako");
            gurin_sakamako.style.display = "block";
            gurin_sakamako.innerHTML = "Jimillar Kudinka: ₦" + jimilla;
        }

        // Aikin Tura Bayanai zuwa Firebase
        window.turaBayanai = async function() {
            var suna = document.getElementById("bako_suna").value;
            var waya = document.getElementById("bako_tel").value;
            var email = document.getElementById("bako_email").value;

            if(suna == "" || waya == "") {
                alert("Don Allah cika Suna da Lambar Waya!");
                return;
            }

            try {
                await addDoc(collection(db, "Abokan_Ciniki"), {
                    sunanka: suna,
                    wayarka: waya,
                    imeil: email,
                    lokaci: serverTimestamp()
                });
                alert("An tura bayanai cikin nasara zuwa Database! 🎉");
                document.getElementById("bako_suna").value = "";
                document.getElementById("bako_tel").value = "";
                document.getElementById("bako_email").value = "";
            } catch (error) {
                alert("An sami matsala wajen aikawa: " + error.message);
            }
        }
    </script>

</body>
</html>
