<!DOCTYPE html>
<html>
<head>
     <title>sunan shafina</title>
     <style>
          body {
               background-color: #f4f4f4;
               /* Canza fasalin rubutun duka shafin */
               font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          }
          h1 {
               color: #2c3e50;
               text-align: center;
               /* Canza girman babban taken shafi */
               font-size: 36px; 
          }
          p {
               color: #555;
               text-align: center;
               /* Canza girman kananan rubutu */
               font-size: 18px;
               /* Bada tazara tsakanin layuka don karatu ya yi sauki */
               line-height: 1.6;
          }
     </style>
</head>
<body>
     <h1>Welcome to my page</h1>
     <p>Sunana Bashar Aliyu. Yau ina koyon yadda ake canza fasali da girman rubutu ta amfani da CSS Fonts.</p>
</body>
</html>
