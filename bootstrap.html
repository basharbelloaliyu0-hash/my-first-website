<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid</title>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; padding: 20px; }
        .container { background-color: white; max-width: 450px; margin: 50px auto; padding: 30px; text-align: center; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .text-success { color: #198754; font-size: 26px; font-weight: bold; margin-bottom: 15px; }
        .text-muted { color: #6c757d; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        
        /* Grid layout in the home */
        .row { display: flex; gap: 10px; margin-top: 15px; }
        .col { flex: 1; }
        
        .btn-main { color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .bg-blue { background-color: #0d6efd; }
        .bg-dark { background-color: #212529; }
    </style>
</head>
<body>

    <div class="container">
        <div class="text-success">Day 3: Bootstrap Grid!</div>
        <div class="text-muted">Look down and see, we divided the bottom line into two equal parts so that the keys are back next to each other..</div>
        
        <!-- We use ROW to open a new line. -->
        <div class="row">
            <!-- COL na farko (Left side) -->
            <div class="col">
                <button class="btn-main bg-blue">Left (Blue)</button>
            </div>
            <!-- COL na biyu (Right side) -->
            <div class="col">
                <button class="btn-main bg-dark">Right (Black)</button>
            </div>
        </div>
    </div>

</body>
</html>
